name: Deploy Frontend PROD to EC2 via ECR

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: swe-team-9/frontend
          IMAGE_TAG: production        
        run: |
          docker build \
            -f ./Dockerfile \
            --build-arg NEXT_PUBLIC_APP_URL="${{ secrets.PROD_NEXT_PUBLIC_APP_URL }}" \
            --build-arg NEXT_PUBLIC_API_BASE_URL="${{ secrets.PROD_NEXT_PUBLIC_API_BASE_URL }}" \
            --build-arg NEXT_PUBLIC_API_URL="${{ secrets.PROD_NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_RECAPTCHA_SITE_KEY="${{ secrets.NEXT_PUBLIC_RECAPTCHA_SITE_KEY }}" \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Deploy to PROD EC2 and Clean Up
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.PROD_EC2_HOST }}         
          username: ${{ secrets.EC2_USERNAME }}  
          key: ${{ secrets.PROD_EC2_SSH_KEY }}        
          script: |
            aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}
            cd /home/ec2-user/prod                  
            docker-compose pull
            docker-compose up -d
            docker system prune -a -f
